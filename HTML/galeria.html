<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria</title>
    <link rel="stylesheet" href="/CSS/style.css" />
  </head>
  <body>
    <header class="encabezado">
      <div class="logo">
        <img src="/IMAGENES/imagen.jpg" alt="logo" class="logo-img" />
      </div>
      <h1 class="titulo">Galeria - Colombia</h1>
      <nav class="menu-nav">
        <a href="/HTML/index.html" class="menu-link">MENU</a>
        <a href="/HTML/galeria.html"class="menu-link">GALERIA</a>
        <a href="/HTML/formulario,.html"class="menu-link">FORMULARIO</a>
      </nav>
    </header>

    <main class="contenido">
      <section class="galeria-polaroid">

        <h2 class="titulo-galeria">PAISAJES HERMOSOS DE COLOMBIA</h2>

        <div class="contenedor-polaroid">

        <figure class="polaroid polaroid-1">
        <img src="/IMAGENES/Cano Cristales.jpg" alt="Cano Cristales">
        <figcaption>Caño Cristales<br><small>Meta</small></figcaption>
      </figure>

      <figure class="polaroid polaroid-2">
        <img src="/IMAGENES/tairona.jpg" alt="Tayrona">
        <figcaption>Nacional Natural Tayrona <br><small>Magdalena</small></figcaption>
      </figure>

      <figure class="polaroid polaroid-3">
        <img src="/IMAGENES/cocora.jpg" alt="Valle del Cocora">
        <figcaption>Valle del Cocora <br><small>Quindío</small></figcaption>
      </figure>

      <figure class="polaroid polaroid-4">        
        <img src="/IMAGENES/tatacoa.jpg" alt="Desierto de la Tatacoa">
        <figcaption>Desierto de la Tatacoa <br><small>Huila</small></figcaption>
      </figure>

      <figure class="polaroid polaroid-5">
        <img src="/IMAGENES/cabo de la vela.jpg" alt="Cabo de la Vela">
       <figcaption>Cabo de la Vela <br><small>Guajira</small>
      </figcaption>
      </figure>

      <figure class="polaroid polaroid-6">
        <img src="/IMAGENES/los nevados.jpg" alt="Parque Nacional Natural Los Nevados">
      <figcaption>Parque Nacional Natural Los Nevados<br><small>Eje Cafetero</small></figcaption>
      </figure>

      </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
