<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria</title>
    <link rel="stylesheet" href="/CSS/style.css" />
  </head>
  <body>
    <header class="encabezado">
      <div class="logo">
        <img src="/IMAGENES/imagen.jpg" alt="logo" class="logo-img" />
      </div>
      <h1 class="titulo">Galeria - Colombia</h1>
      <nav class="menu-nav">
        <a href="/HTML/index.html" class="menu-link">MENU</a>
        <a href="/HTML/galeria.html" class="menu-link">GALERIA</a>
        <a href="/HTML/formulario,.html" class="menu-link">FORMULARIO</a>
      </nav>
    </header>

    <main class="contenido">
      <section class="seccion-formulario">
        <h2 class="titulo-formulario">Cuéntame qué te pareció la página</h2>

        <form class="formulario-opinion">
          <div class="grupo-campo">
            <label for="nombre">Nombre completo</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Escribe tu nombre"
            />
          </div>

          <div class="grupo-campo">
            <label for="celular">Celular</label>
            <input
              type="tel"
              id="celular"
              name="celular"
              placeholder="300 000 0000"
            />
          </div>

          <div class="grupo-campo">
            <label for="correo">Correo electrónico</label>
            <input
              type="email"
              id="correo"
              name="correo"
              placeholder="tucorreo@example.com"
            />
          </div>

          <div class="grupo-campo">
            <label for="opinion">¿Qué te pareció la página?</label>
            <textarea
              id="opinion"
              name="opinion"
              rows="4"
              placeholder="Escribe tu opinión"
            ></textarea>
          </div>

          <button class="btn-enviar">Enviar opinión</button>
        </form>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
